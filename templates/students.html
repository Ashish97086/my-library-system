<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <style>body { background: #f4f7f6; padding: 40px; }</style>
</head>
<body class="animate__animated animate__fadeInUp">
    <div class="container">
        <a href="/" class="btn btn-dark btn-sm mb-4">Back to Dashboard</a>
        <h2 class="mb-4">👥 Student Directory</h2>
        <div class="card border-0 shadow p-4">
            <table class="table table-striped">
                <thead class="table-dark"><tr><th>ID</th><th>Name</th><th>Resource</th><th>Joined</th></tr></thead>
                <tbody>
                    {% for s in students %}
                    <tr><td>#{{ s[0] }}</td><td>{{ s[1] }}</td><td>{{ s[2] }}</td><td>{{ s[3] }}</td></tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
