<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
</head>
<body class="bg-light p-5 animate__animated animate__slideInRight">
    <div class="container">
        <a href="/" class="btn btn-secondary mb-4">Back</a>
        <h2 class="mb-4 text-primary font-weight-bold">💰 Payment History</h2>
        <div class="row g-3">
            {% for s in students %}
            <div class="col-md-4">
                <div class="card border-0 shadow-sm p-3">
                    <h5>{{ s[1] }}</h5>
                    <p class="mb-1 small">Total: ₹{{ s[5] }} | Paid: <span class="text-success">₹{{ s[6] }}</span></p>
                    <p class="fw-bold text-danger">Due: ₹{{ s[5]-s[6] }}</p>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
